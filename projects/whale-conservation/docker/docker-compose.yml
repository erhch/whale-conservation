version: '3.8'

# 🐋 生物鲸创管理系统 - Docker Compose 配置
# 用于本地开发和测试环境快速部署

services:
  # PostgreSQL - 主数据库 (带 PostGIS 和 TimescaleDB 扩展)
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: whale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whale_conservation
      POSTGRES_USER: whale_admin
      POSTGRES_PASSWORD: whale_secure_pwd_2026
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ../database/seeds:/docker-entrypoint-initdb.d/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whale_admin -d whale_conservation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whale-network

  # Redis - 缓存和会话存储
  redis:
    image: redis:7-alpine
    container_name: whale-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whale-network

  # MinIO - 对象存储 (图片、视频等)
  minio:
    image: minio/minio:latest
    container_name: whale-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: whale_minio_admin
      MINIO_ROOT_PASSWORD: whale_minio_pwd_2026
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - whale-network

  # Adminer - 数据库管理界面 (可选)
  adminer:
    image: adminer:latest
    container_name: whale-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: lucca
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - whale-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  whale-network:
    driver: bridge
